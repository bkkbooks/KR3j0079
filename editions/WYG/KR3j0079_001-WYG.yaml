body:
  text: 識小編卷上東流知縣董豐垣撰唐虞五服成周九服考案王制九州州方千里是方三千里之地積之為方千里者九也與禹貢五服職方氏九服皆不合鄭康成謂禹承堯舜要服之内地方七千里殷承夏末更制中國方三千里之界分為九州而建千七百七十三國周公復唐虞之舊域分其五服為九其要服之内亦方七千里廣其土增其爵此以王制為殷制而職方氏為周制也不知禹貢言面與周禮言方不同言面則兩面相距為千里言方則每面各二百五十里非一面五百里也禹貢五服帝畿在内各數其一面五服總二千五百里兩面相距為五千里職方九服王畿不在内通舉其兩面九服總四千五百里并王畿為五千五百里増于禹者特五百里之藩服益稷外薄四海咸建五長即是其地其名雖增而地未嘗增也陸氏佃易氏袚金氏吉甫之説足以破千載之疑矣許慎以漢地理志考之自黒水至東海衡山之陽至朔方經畧萬里葢計其延袤而言非開方也又賈公彦云若據鳥飛直路此周之九服亦止五千若隨山川屈曲則禹貢亦萬里彼此不異也是禹服周服實皆五千但書據鳥飛直路禮計山川屈曲故多寡不同耳案二經里數皆以開方言之無計人跡屈曲之理禹貢錐指已辨之矣由斯言之禹貢五服共五千里王制千里之内曰甸千里之外曰采曰流采即百里采流即二百里流舉首尾以該中國語邦内甸服邦外侯服侯衛賔服衛所謂奮武衛即綏服也蠻夷要服戎狄荒服皆虞夏之制也職方王畿并九服大司馬作九畿共五千五百里周官稱六服羣辟者孔疏謂夷鎮藩在九州之外王者羈縻而已不可同華夏也又稱五服一朝者孔疏謂要服路逺不能常及期故不數也若王制之方三千里所謂東不盡東海西不盡流沙南不盡衡山北不盡恒山専指井田之實數言之也周官之五千五百里所謂東漸于海西被于流沙朔南暨兼邑居道路山川林麓言之也不然如鄭康成之説方三千里者是方千里者九也方七千里者是方千里者四十九也周之於殷五倍其地而有竒而周公斥大九州之界經無明文何由三千里而拓至七千里耶案大戴禮朝事篇云千里之内嵗一見千里之外千五百里之内二嵗一見千五百里之外二千里之内三嵗一見二千里之外二千五百里之内四嵗一見二千五百里之外三千里之内五嵗一見三千里之外三千五百里之内六嵗一見與職方里數不同葢職方九服王畿不在數内大戴禮則并王畿數之耳周禮封疆孟子王制田地説周禮言封疆自方五百四百三百以至二百一百里孟子言地王制言田自方百里以至七十五十里周禮之男邦當孟子王制之公侯有説乎曰成周幅􅊷之廣未有過于漢者請以漢地理志證之漢時天下之地東西九千三百二里南北一萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林麓羣不可墾其三千二百二十九萬九百四十七頃可墾定墾田八百二十七萬五百三十六頃帝王世紀禹貢九州之地凡二千四百三十萬八千二十四頃定墾者九百一十萬八千二十四頃不墾者千五百萬二千頃本諸孝經援神契與漢志不同季氏本曰其曰定墾者漢時已墾之田也可墾者通計周時井授之田而荒蕪者尚在其中也然漢以二百四十步為畆當周􅇍百之畆二畆四分每頃當周二百四十畆可墾之田三千二百二十九萬九百四十七頃當周七千七百四十九萬八千二百七十二頃八十畆王制以為八千一百萬頃舉大畧也今通計王制井田之數天子田方千里積九百萬頃公侯二百四十國積二千一百六十萬頃伯四十八國積二千一百一十六萬八千頃子男九百六十國積二千一百六十萬頃餘四百一十三萬三百七十二頃八十畆以為附庸閒田春秋繁露附庸字者方三十里名者方二十里人氏者方十五里附庸之數大率倍於子男則餘田不給於封矣況閒田乎愚按王制九州千七百七十三國亦舉大畧而言豈足盡信哉朱子語錄王制四海之内九州州方千里及諸建國之數恐只是諸儒做箇如此筭法其實不然建國必因其山川形勢無截然可方之理又冀州最濶今河東河北數路都屬冀州雍州亦濶陜西秦鳯皆是至青徐兖豫四州皆相近做一處其疆界又自窄小其間山川險夷又自不同難㮣以三分去一言之張氏栻以王制三分去一為𫝊者之失若周官九服方五千五百里為方千里者二十七方百里者二十五提封田二萬萬六千五百五十萬頃漢提封田一萬萬四千五百一十三萬六千四百五頃當周田三萬萬四千八百三十二萬七千三百七十五頃增於周者八千二百八十二萬七千三百七十二頃漢武帝東置𤣥莬樂浪西置張掖酒泉南置南海鬰林蒼梧交趾合浦九真日南犍為等郡北置朔方故疆域之廣非前代所及也由是觀之孟子言地王制言田皆班祿之實數所謂土其田也漢志可墾之田是也周禮之封疆猶詩之大啟左傳之賜履論語之邦域韓之奄受北國衛之封畛土畧所謂制其域也不特兼山川附庸言之漢志邑居道路山川林麓羣不可墾者皆在其中也案職方氏凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯當作十一伯方二百里則二十五子方百里則百男似不可盡泥葢諸公之地封疆方五百里猶云今魯為方百里者五非為方百里者二十五也如國策楚地方五千里止方千里者五非為方千里者二十五也有虞氏郊堯宗堯辨魯語有虞氏禘黄帝而祖顓頊郊堯而宗舜祭法更其文曰禘黄帝而郊嚳祖顓頊而宗堯愚謂郊堯則可宗堯則不可何以言之夏之郊鯀也殷之郊冥也葢鯀障洪水而殛死㝠勤其事而水死皆以死勤事之例也杞始以祖禹者郊禹宋以祖契者郊契故禮運曰杞之郊也禹也宋之郊也契也舜父無功不足以配天故郊以堯也尚書大𫝊維十有三祀帝入唐郊猶以丹朱為尸按晉語祀夏郊董伯為尸韋昭注謂神不歆非類而以董伯為姒姓使虞不郊堯安用丹朱為尸哉至於虞之廟制雖不可考然以商周例之則當自立七廟不得承堯之祖廟也案大戴帝繋篇黄帝産𤣥囂𤣥囂産蟜極蟜極産髙辛是為帝嚳帝嚳産放勲是為帝堯黄帝産昌意昌意産髙陽是為帝顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽瞍瞽瞍産重華是為帝舜𤣥囂即青陽所謂少昊也使從祭法而宗堯則堯為父廟嚳為王父廟顓頊非嚳父以受國為曽王父廟少昊為髙王父廟黄帝尚在五廟之列顓頊安得為太祖且顓頊受國於少昊何得祧少昊禘黄帝而以顓頊配乎惟從魯語而宗舜則顓頊至舜七世得為太祖矣顓頊父昌意不在帝位故不禘昌意而禘黄帝也且虞之自立其廟也有明徴矣中庸宗廟饗之益稷祖考來格生事之則死饗之矣豈有棄其親廟而宗堯之理乎益稷虞賔在位孔𫝊丹朱為王者後故稱賔史記堯子丹朱舜子商均皆有疆土以奉先祀朱既奉其祀于丹而舜復宗其廟于虞其可乎惟舜典月正元日舜格于文祖孔疏謂此猶是堯之文祖自此以後舜當自立文祖之廟堯之文祖當遷于丹朱之國也大禹謨正月朔旦受命于神宗孔疏謂神宗當舜之始祖為黄帝顓頊之等庶近之矣然帝繋所載帝王世次亦不可盡信也堯典有鰥在下曰虞舜路史其先國於虞始為虞氏晉語虞幕能聴協風以成樂物生者也與夏禹商契周棄並列其為始封之君無疑韋昭以為舜後虞思謬也左傳自幕至于瞽瞍無違命魯語亦云幕能帥顓頊者也有虞氏報焉而帝繫自顓頊至瞽瞍無幕名惟舜之自立祖廟則斷無疑者魯語凡禘郊宗祖報此五者國之典祀也幕舜之先也非堯之先也虞既報幕則郊堯而不郊嚳宗舜而不宗堯益明矣韋昭謂舜在時則宗堯舜崩則子孫宗舜故郊堯亦曲説也論丹朱為堯尸荅􅈠丈大斌承諭丹朱為堯尸與孫為王父尸未合竊謂昭穆之名起於太廟中祫祭位鄉書稱乃穆考文王詩謂武王為昭考是祖宗之昭穆也左傳文昭武穆周公之𦙍是子孫之昭穆也古者孫為王父尸子不為父尸以昭穆不可亂也若郊堯之日本無昭穆何父子之嫌哉客更有難者曰天非人鬼安得有尸曰節服氏送逆尸從車張子謂后稷配天而有尸則郊堯有尸明矣如冡人凡祭墓為尸丹朱奉堯之祀亦猶冡人之守墓也以為堯尸不亦可乎太社在北郊辨郊社之聚訟也自漢立南北郊始也余謂禮有郊天而無郊地有南郊而無北郊何以言之按大宗伯以禋祀祀昊天上帝以血祭祭社稷司服王祀昊天上帝則服大裘而冕祭社稷則希冕月令以共皇天上帝社稷之饗皆社稷對舉而别無地祇之祀大司樂但言冬日至祭天于地上之圜丘夏日至祭地于澤中之方丘而無南北郊之説至郊特牲云兆于南郊家語兆丘於南尚書大𫝊祀上帝於南郊逸周書設丘兆于南郊而北郊無文漢志引禮記日燔柴於泰壇祭天也瘞埋於泰折祭地也兆於南郊所以定天位也祭地於泰折在北郊所以就隂位也下四句乃申説祭法之意非禮記本文以是知祭地之太社周禮謂之方丘亦謂之大􅅘祭法謂之泰折詩書謂之冡土亦謂之神后后土實在庫門之内右而非在北郊明矣或曰澤中方丘周禮有明文而謂在庫門之右有説乎曰召誥用牲于郊乃社于新邑郊不曰新邑者郊在國外社在國内也禮運祀社于國所以列地利也郊特牲云於郊故謂之郊則社不名郊可知小宗伯掌建國之神位右社稷左宗廟匠人營國左祖右社鄭註謂庫門内雉門外之左右詩廼立冡土與臯門應門並舉亦在國之一證是太社在庫門之右一名方澤為二方壇東社西稷也郊特牲云卜之日王立于澤親聴誓命獻命庫門之内戒百官太廟之命戒百姓是澤宫與祖廟同在庫門内也又云王親誓社以習軍旅射義天子将祭必先習射于澤司弓矢云澤供射椹質之弓矢是太社壇周以澤宫澤北正中為橋橋内近北空地為習射處也祭時王自應門而西由橋以至澤中方丘也近蔡氏徳晉論之詳矣或曰禮兆天於南郊兆五帝於四郊則地在北郊無疑而子闢之何也曰地祇與天神不同按小宗伯兆五帝于四郊月令迎春東郊迎夏南郊迎秋西郊迎冬北郊而惟冬至郊稱皇天亦曰上帝是圜丘為南郊對五帝之在四郊者言之也所以祀天神也祭法太社以下有王社國社侯社置社而惟夏至太社稱皇地亦曰后土是方丘為太社對王社以下者言之也所以享地祇也或曰天子祭天地諸侯祭社稷何以地外有社乎曰地即社也諸侯不曰地而曰社者猶公羊子天子祭天諸侯祭土爾家君謂天子太社祭率土大􅅘故謂之地王社祭畿内土􅅘國社侯社祭一方土􅅘故但謂之社也是也或曰郊社有常期曲禮大饗不問卜是已而大宗伯凡祀大神享大鬼祭大􅅘帥執事而卜日何與曰此謂國有大故如天子将出祀上帝及四望類于上帝宜于社以非常祀故卜日爾非正祭也本劉氏敞案大宗伯以吉禮事邦國之鬼神􅅘列舉昊天上帝日月星辰司中司命飌師雨師社稷五祀五嶽山林川澤四方百物而獨不及地小宗伯建國之神位左宗廟右社稷列舉四望四類山川丘陵墳衍之兆而亦不及地則大􅅘即社也祭法祭天祭地祭時祭寒暑祭日祭月祭星祭水旱祭四方山林川谷丘陵而不及社司服祀昊天上帝祀五帝享先王先公饗射祀四望山川祭社稷五祀祭羣小祀而不及地則社為地祭明矣郊特牲曰郊所以明天道社所以神地道於郊曰報本反始於社亦曰報本反始泰誓郊社不修中庸郊社之禮曾子問嘗禘郊社皆與郊對舉則社非祭地而何召誥用牲于郊乃社于新邑禮運祭帝于郊所以定天位祀社于國所以列地利則社非在國而何社在庫門之内自不得以郊名矣郊用辛社用甲説或曰冬日至祭天夏日至祭地皆有常期而郊特牲郊用辛社用甲何也曰周郊以日至武成庚戍柴召誥丁巳用牲于郊是告祭非正祭祈榖以元日鄭康成以為上辛但卜牲而不卜日魯僭祈榖之禮而名曰郊明堂位孟春寅月祀帝于郊左傳啟蟄而郊郊而後耕是也雜記引孟獻子曰正月日至可以有事于上帝可以者獻子謂此月宜郊明前此未嘗用也不用日至之郊降于天子也其日皆用辛成十七年辛丑用郊定十五年夏五月辛亥郊哀元年夏四月辛巳郊是也魯人卜牲又卜日者公羊傳曰卜郊非禮也魯郊非禮也何氏休謂禮天子不卜郊魯郊非禮故卜爾是也魯郊以啟蟄前期十日帥執事而卜日啖氏助謂當以周二月卜三月上辛不吉則卜中辛又不吉則卜下辛正與少牢筮句有一日不吉則筮逺日曲禮旬之内曰近某日旬之外曰逺某日吉事先近日之例相符榖梁以為踰月乃卜者非是其以正月至三月為郊之時亦與啟蟄而郊不合郊特牲郊之用辛也周之始郊日以至武成庚戍柴非日至之郊不得為始郊家語周之始郊其月以日至其日用上辛葢周日至之始郊適遇辛日故魯人諏用之非周禮也至于社之用甲與月令仲春擇元日命民社正合乃春祈社稷亦非夏至方丘之祀矣禘祫一事并嵗舉以午月魯禘不追所自出辨禮大𫝊喪服小記同禮不王不禘王者禘其祖之所自出以其祖配之證以國語祭法而其義甚明虞夏禘黄帝殷周禘嚳即自出之帝也虞夏祖顓頊殷祖契周祖文王當祖后稷别有辨即配之之祖也猶公羊傳郊則曷為必祭稷王者必以其祖配也春秋文二年八月大事于太廟公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳于太祖未毁廟之主皆升合食于太祖榖梁𫝊同五年而再殷祭但言毁廟未毁廟之主而不及所自出則大祫之非禘昭昭矣趙氏匡分禘祫為二朱子取之楊氏復又推廣之一破漢魏支離之説萬氏斯大乃欲合為一事并謂禘嵗舉以午月魯禘不追所自出是大不然大𫝊以祖配之與孝經郊祀后稷以配天宗祀文王以配上帝一例無羣祖並配之文既云禘其祖之所自出又云以其祖配之決無上指始祖下包羣祖之理且合禘祫為一則周禘時后稷亦屈從南北之班而昭穆亂矣今謂始祖而下皆曰祖以祖配之可以包諸祖謬一也禮運魯之郊禘非禮也則郊禘並重矣國語祭法皆以郊禘對言之爾雅禘大祭也葢取報本追逺之意若以不合昭穆而小之則孟春祀帝于郊配以后稷不及羣祖亦不得名大祭乎謬二也詩周禮公羊爾雅明堂位皆云春祠夏禴秋嘗冬烝亦有謂之禘者三年喪畢之際謂之吉禘如春秋吉禘于荘公按杜氏預註三年喪畢致新死者之主于太廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘近毛氏竒齡謂禘祭有三而無祫名一曰大禘一曰吉禘一曰時禘吉禘即大祫惟三年喪畢有之愚謂大祫是合毁與未毁之主當在太廟而不得在禰宫矣全氏祖望曰吉禘之祭周時或有其禮但曰吉禘則與大禘不同而所謂審昭穆者亦仍當在太祖之廟不應在禰廟耳其謂吉禘即大祫則果謬也左傳晉人曰以寡君之未禘祀是也四時之祭謂之時禘左傳之烝嘗禘於廟王制之春礿夏禘祭義郊特牲之春禘秋嘗荀子之禴禘烝嘗左傳昭十五年春禘于武公而經書有事于武宫二十五年禘于襄公而經不書定八年冬十月辛卯禘于僖公而經書從祀先公變禴之名而曰禘者葢小禘也原非禘也猶冬烝之在三年謂之祫而每年則小祫也亦非祫也萬氏専據夏禘之文并雜記七月而禘獻子為之也謂魯初以六月行禘明堂位其定以七月則由獻子且援日至郊天之例每嵗午月舉行謬三也天保之詩但言禴祠烝嘗于公先王而不及自出之帝則禘非時祭可知萬氏乃以詩作於文武實諸侯之禮其追王上祀而春禴夏禘至周公相成王而後定竊謂既不追王詩安得有先王且中庸言武周達孝明云禘嘗之義武成金縢已有太王王季文王之號中庸追王葢在相武王時則禘郊大典自武周已制矣謬四也萬氏又據公羊五年再殷祭謂魯雖僣禘然自為殷祭間嵗一行不若周之嵗舉故王制亦有祫則不禘之言公羊所言葢魯禘也案此亦本王制禘一犆一祫而言然謂五年兩禘亦與間嵗一行不合謬五也曽子問祫祭于祖則祝迎四廟之主此據諸侯若天子則祝迎六廟之主公羊傳大事于太廟則合祭毁廟未毁廟之主荀子禴禘烝嘗之外又有大祫是大祫與時祫為二也爾雅春祠夏禴秋嘗冬烝又云禘大祭也是禘與時祫又二也禘必上追乎自出而祫則旁及乎祧主是禘又非祫也萬氏既合禘祫為一又合大祫時祫為一妄謂曾子問祫祭于祖通指嘗禘烝三祫公羊大祫専指夏禘之祫烝嘗之祫通乎諸侯夏禘大祫専于天子謬六也萬氏泥於明堂位以禘禮祀周公于太廟而不言文王謂魯但用禘禮而不追所自出夫明堂位不云升歌清廟下管象舞清廟之詩云濟濟多士秉文之徳象武之詩云允文文王克開厥後皆祀文王之樂歌其徹以雍也曰皇考曰烈考曰文母又祀文王之詩葢魯用以徹禘祭之爼而序者遂以為禘太祖也使魯但用禘禮而不及文王又何以升歌清廟下管象而徹以雍乎謬七也姚大世鈺曰但用禘禮而不追所自出先儒之説明堂位者亦多有此言愚則第就春秋傳臨于周廟之文并杜註所稱文王廟推之則廟且得立豈有祭而不追所自出者乎經文又言祀帝于郊配以后稷則稷且得郊其禘文王更不言可知矣或曰三年一祫五年一禘禮緯之言也而子信之可乎曰按學記未卜禘不視學解者謂禘在五年小成之年家語禘者皆五年大祭之所及也劉向説苑三嵗一祫五年一禘後漢張純奏禮三年一祫五年一禘亦據一閏再閏定禘祫之期説文亦引周禮三嵗一祫五嵗一禘則其説不始于禮緯矣家君云緯書起於哀平之際劉向尚是元成間人家語雖非孔壁之書而所論禘郊祖宗與祭法相表裏不必以經無明文而致疑予嘗考周禮儀禮無禘祫名而有其禮喪服曰天子及其始祖之所自出此禘也諸侯及其太祖即祫也司尊彛有四時之間祀追享朝享追享即禘朝享即祫也大禘雖非時祭往往與夏祭相連明堂位夏六月以禘禮祀周公於太廟今四月也雜記七月而禘今五月也是以張純謂禘在四月崔靈恩謂宜在五月則禘在夏月明矣大祫見於公羊傳而國語自𤣥王以及主癸莫若湯自稷以及王季莫若文武商周之烝也未嘗躋湯文武為不踰也左傳禹不先鯀湯不先契文王不先不窋亦兼毁廟言之盤庚兹予大享于先王爾祖其從與享之朱子以長發為大祫之詩阿衡亦與其間周禮凡有功者祭于大烝是時祫之年止謂之烝而大祫之年乃謂之大烝亦謂之大享也張純亦謂祫在十月則祫在冬月明矣國語明言烝将躋僖公則祫為冬祭可知經書八月葢不時也夫禘在夏月祫在冬月其年月各異而合為一事可乎曰三年五年不知從何年算起若從君立之元年則偶有未及三年五年者奈何若從開國之元年則或遭崩薨之事奈何曰案曾子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢則前君既薨廢而不舉當從新君之立年始矣如三年祫五年禘八年祫十年又禘公羊五年再殷祭謂五年之中一禘一祫也爾雅以禘為大祭則殷祭是禘無疑宣八年經書有事于太廟而不書禘則非禘也惟僖八年書禘于太廟者此魯之失禮春秋常事不書楊氏復謂用禘禮合先祖叙昭穆用致夫人於廟而禘禮始與祫混淆而無别是也曰詩序雝禘太祖也長發大禘也子庸知禘之非祫乎曰楊氏復謂長發大禘但述𤣥王以下而上不及于所自出之帝雝禘太祖無一詞及其嚳稷而皆稱述文王武王則安得謂之禘詩乎其詞簡而該矣曰大𫝊王者禘其祖之所自出以其祖配之繼曰諸侯及其太祖大夫士干祫及其高祖則似天子之禘亦可謂之祫而諸侯之祫不可謂之禘矣曰非也謂天子得以兼祫則可謂天子之禘即祫則不可所謂上得兼下下不得兼上也禘祫為一事近代自萬先生外如朱長孺毛大可皆主此論然異同之辭則自漢魏諸經師已紛如聚訟惟唐趙伯循之説朱子有取焉故宋儒亦稱其言簡義該確不可易此文審諦經義而折其中殆欲以折充宗之角矣姚蕙田東周祖文宗武辨祭法周人祖文王而宗武王萬氏斯大謂西周祖稷而宗文武平王遷洛仍故有之文武廟祖文宗武故西周之廟并世室而為九東周之廟合武王而為八又引周官守祧奄八人洛誥文王騂牛一武王騂牛一襄王賜胙齊桓顯王賜胙秦孝皆言文武為證愚謂不然周官守祧奄八人是時未有文武二世室賈疏謂守七廟并姜嫄廟是也非晚周之制也君子将營宫室宗廟為先成王營雒邑為東都郊社並舉豈有専立文武二廟而不及他廟之理乎洛誥文王騂牛一武王騂牛一孔𫝊謂特加文武各一牛告白尊周公立其後為魯侯是告祭非正祭猶大雅之告于文人錫山土田國語命魯孝公于夷宫祭統所謂祭之日一獻君降立于阼階之南南鄉所命北面史由君右執策命之者也襄王顯王之賜胙葢指其受命之君而言猶伊訓之祗見厥祖商頌之湯孫之将也非祖文宗武也且東周之祖稷經𫝊固有明徴矣國語自𤣥王以及主癸莫若湯自稷以及王季莫若文武商周之烝也未嘗躋湯與文武為不踰也是時東遷已久則周不祧稷明矣證一也詩長發有𤣥王之文戴公時大夫正考甫得之以歸祀其先王禮運宋之郊也契也則宋尚祖契而謂東周不祖稷可乎證二也家語孔子觀周遂入太祖后稷之廟證三也周書作雒篇乃位五宫大廟宗宫考宫路寝明堂孔晃注大廟后稷二宫祖考廟也證四也吳㓜清謂周祖后稷文武皆宗記言有失乃不刋之論天子諸侯太祖考榖梁傳始封必為祖韋氏𤣥成曰王者始受命與諸侯始封之君俱為太祖愚按殷契周稷皆始封之君並不以始受命者為祖也三代以下無始封之君宜立親廟六而虛其太祖以俟始受命者之入可也諸侯祖廟有三等一是先代之後如焦神農後祝黄帝後薊帝堯後陳帝舜後此五廟俱實者左傳任宿須句顓㬰實司太皥與有濟之祀楚滅六而臧文仲謂臯陶庭堅不祀宜從此例若把祖大禹宋祖契與湯觀禮運把之郊也禹也宋之郊也契也可見修其禮物仍立七廟不止五廟也左傳宋祖帝乙特使之上體先王耳非魯鄭出王廟之比也一是始封之君如齊吕尚左傳嘗于太公之廟又云邀福于太公丁公楚鬻熊秦非子類左傳䕫子不祀祝融與鬻熊楚人讓之祝融之祀或楚自立之非周典耳國語伯夷能禮于神以佐堯者也伯翳能議百物以佐舜者也其後皆不失祀案齊祖太公則秦不祖伯翳可知此實四而虛一者謂虚其太祖以俟始封者之人一是王子弟出封則五廟俱虛禮諸侯不敢祖天子是也魯鄭之立周廟此廟也非祖也左傳以為鄭祖厲王者非案左傳臨于周廟文王廟别于周公之廟子産使祝史徙主祏于周廟厲王廟别于太宫則在五廟之外矣大夫適士官師廟制考大夫三廟王制有太祖而無曽祖祭法有曾祖而無太祖兩説不同愚案大夫干祫及其高祖則未必有太祖矣春秋僖十五年震夷伯之廟傳謂展氏之祖案夷伯不知何人然無駭隠時賜族展氏僖去隠未逺安見夷伯非其皇考廟乎至昭十二年左傳鄭簡公卒将為塟除及㳺氏之廟註謂子太叔之祖廟亦未見是太祖也王制諸侯之大夫不世爵祿觀中庸祭塟之制可見世爵周之末失也豈初制即立太祖耶若諸侯子弟始為大夫則三廟俱虛禮大夫不敢祖諸侯是也惟别子得立出公廟為收族敎宗女之地故大宗不可絶而魚石以向戍在為桓氏雖亡亦偏也然必立於宗邑所以邑有先君之廟曰都孟嘗立廟于薛猶是此制若設于私家即為非禮三桓是也王制士一廟祭法適士上士二廟曰考廟曰王考廟顯考當作皇考無廟官師中下士一廟曰考廟王考無廟而祭之此即為士之壇墠二説不同案儀禮都邑之士則知尊禰學士大夫則知尊祖是適士得祭祖異於中下士之祗祭禰也王制似不如祭法之備矣至鄭氏康成創為中士下士祖禰同廟之説則祭法明云王考無廟而祭之顯悖經文毛氏竒齡駮之是也魯廟制考王制諸侯五廟二昭二穆與太祖之廟而五明堂位魯公之廟文世室也武公之廟武世室也則似魯有七廟矣愚謂不然春秋文十三年世室屋壞公羊傳魯公稱世室榖梁傳伯禽曰大室是魯公為世室在五廟之外與周公之廟並百世不遷也成六年立武官公羊左氏並譏之葢魯人以鞌之戰倚晉之功其為先君宫告成事而已非宗於廟也若左傳臨于周廟杜氏預以為文王廟此廟也非祖也故不與五廟之數也至於煬宫之立與武宫同失桓宫僖宫親盡不毁皆禮之末失矣兄弟同昭穆辨左傳太伯虞仲太王之昭也虢仲虢叔王季之穆也管蔡郕霍魯衛毛耼郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也曹叔振鐸文之昭也先君唐叔武之穆也祖孫同昭穆父子異昭穆此世次之昭穆也王制天子七廟三昭三穆與太祖之廟而七先入者為昭後入者即為穆此廟祧之昭穆也天子諸侯不幸無後必以兄弟之子為嗣取其昭穆相當也若世次昭穆與廟祧昭穆不同如桓王繼平王則祖為昭而孫為穆定王繼􅋌王則兄為穆而弟為昭孝王繼懿王則兄子為昭而叔父為穆雖不得竟稱為子而昭穆相承固有為後之義矣自西京以下但知兄弟伯叔之序而不知臣子之一體於是創為同堂異室之制謂父子異昭穆兄弟則昭穆同其説似是而實非也何以言之春秋躋僖公三𫝊皆以父子祖禰為言國語夏父弗忌曰明者為昭其次為穆則異昭穆之明證也使如何氏休之説謂隠桓與閔僖同北面西上則兄弟未嘗異昭穆特升其位次耳國語何以云明者為昭其次為穆乎其不可一也書七世之廟可以觀徳荀子有天下者事七世有一國者事五世説者謂父子相繼為一世兄弟同一世不知國語帝甲亂之七世而隕史記自中丁以來比九世亂自武丁至紂凡九世皆數其弟無論行軰也假若兄弟同昭穆𫝊弟者歴世不祧𫝊子者乃祧一廟多𫝊一弟即多享一代之祭如沃丁太庚同一廟至小乙入廟而同祧一享十六代一享十五代小甲雍已大戊同一廟至武丁入廟而同祧享十五十四十三代不等仲丁外壬河亶甲同一廟至祖庚入廟而同祧享十三十二十一代不等是主之毁與未毁直繋乎𫝊子𫝊弟耳參差不一何以觀徳其不可二也案徐邈曰若兄弟異昭穆設兄弟六人為君當祀不及祖禰劉氏敞駮之曰兄弟六人相代為君亦六代祀祖禰矣假令非兄弟相代其祖亦當遷矣不得故存也是也曾子問七廟五廟無虛主又云廟有二主自齊桓公始也然則一廟一主經有明文同堂異室之制起於漢代成周以上未之有也乃援考工記世室明堂皆五室之文為比謬亦甚矣其不可三也春秋丹桓宫楹刻桓宫桷是桓自有宫不與隠同也左傳獻俘于文宫是文自有宫不與惠同也若兄弟同昭穆則兄為弟後如閔僖之類先弟後兄猶之可也設叔繼兄子則當升祔于兄廟先入者未祧後入者已毁天子不得享六代之祭諸侯不得受四代之祀矣然猶各居一廟不壓于所尊也至祫祭之時叔之為臣者既進位乎父行兄子之為君者反退居于子列尊卑易位謂之非逆祀可乎其不可五也然則公羊為人後者為之子指昭穆相當者言之也曲禮稱孝王某指昭穆不相當而但為後者言之也曲禮諸侯内事曰孝子某侯某全氏祖望以孝子二字為衍文愚按某侯是外事之稱當是孝侯某之誤惟昭穆不相當則一切喪祭如為子之禮而不得竟稱子漢成帝不肯立中山王而立定陶王謂兄弟不得相入廟豈主祭不入廟乎不以父昭子穆之禮入廟也故班固云昭而不穆是非同昭穆之説也謂雖序昭穆而非父子也如此則達禮之變而不失其常矣遷廟藏毁主辨曾子問天子崩諸侯薨則祝取羣廟之主而藏諸祖廟及卒哭成事而後主各反其廟君去其國則太宰取羣廟之主以從祫祭于祖則祝迎四廟之主西升于太廟毛氏竒齡據以駮韋氏毁主蔵太祖之説曰羣廟者四廟之外正毁主所藏之廟也其廟曰遷廟又曰祧廟惟國有凶喪則斂而蔵諸太廟今曰毁主蔵太祖則是以凶禮為恒禮而可乎又據公羊傳周公為太廟魯公為世室羣公為宫謂羣公者考公以後諸祧公也成六年立武宫昭十五年有事于武宫爾雅有東西廂者為廟無東西廂者為宫曾子問王者興師曷為載遷廟之主以行孔子謂遷廟之主可虛七廟之主不可虛哀三年桓僖宫災𫝊謂火踰公宫及桓僖宫定八年從祀先公是時桓距哀十一世閔僖距定七世八世正所謂毁主藏遷廟以一宫而合羣公之宫者并文王世子國君出疆公族無事者守公宫昏義教于公宫證之是遷廟另一廟在七廟之外矣愚謂不然曾子問羣廟之主即四廟之主也不言毁主者藏諸太祖不必取也閔二年夏五月乙酉吉禘於荘公𫝊曰其言于荘公何未可以稱宫廟也曷為未可以稱宫廟在三年之中矣夫三年之中稱公則三年之外稱宫矣毛氏偏據爾雅之文遂岐宫與廟而二之不知爾雅云室有東西廂曰廟無東西廂有室曰寝並未嘗云無東西廂曰宫也請以經𫝊折之春秋荘二十三年秋丹桓宫楹二十四年春刻桓宫桷成三年新宫災公羊子曰宣公之宫也則考廟也國語命魯孝公于夷宫則王考廟也詩閟宫左傳卜臨于大宫朝于武宫求入于大宫盟于大宫則太祖廟也是羣公為宫即四親之廟矣且曾子問遷廟之主猶公羊子毁廟之主也七廟之主則未毁廟之主也非别為一宫以藏祧主也春秋桓僖宫災孔子在陳聞火曰其桓僖乎公羊傳謂毁廟不當復立故災家語亦詳載其説然則公宫即宗廟也桓僖之廟則當毁而不毁者矣文王世子庶子以公族之無事者守公宫疏總下文正廟宫室言之昏義明言祖廟未毁敎于公宫未嘗以為祧主之廟也至定八年從祀先公當以合祭時正之如公羊子毁廟未毁廟之主皆升合食于太祖非有閔僖二宫矣使考公以下諸祧公别有一宫以藏之則魯立煬宫立武宫皆未嘗稱廟不過遷廟中之二宫矣春秋又何以非之耶大戴禮白虎通許慎五經異義以及公羊榖梁諸説皆云宗廟之主藏于太廟室壁韋𤣥成謂毁廟藏于太祖者得之鄭康成謂先公之遷主藏于后稷之廟先王之遷主藏于文武之廟則文武未立世室時太王王季已遷入太廟夾室矣朱子又謂自立文武世室之後凡昭之祧主藏于武世室穆之祧主藏于文世室不必藏于太祖竊謂惟文武二世室則可設太廟以下止有一世室如魯之伯禽成六年立武宫與煬宫一例明堂位誤以為武世室齊之丁公據左傳邀福于太公丁公亦是不祧之廟則昭之祧主入于世室而穆之祧主又藏于何所乎恐當以太廟為正識小編卷上
