body:
  text: 識小編雜家類二雜考之屬提要臣等謹案識小編二卷國朝董豐垣撰豐垣字菊町烏程人乾隆辛未進士官東流縣知縣是書凡二十四篇議禮者十之九如前儒謂祭社即祭地多不信周禮祭地於澤中之方丘即王制之大社同在庫門內今考明堂位曰春社秋省郊特牲曰社祭土日用甲月令曰仲春擇元日命民社周禮大司馬中春教振旅遂以搜獻禽以祭社肆師社之日涖卜來嵗之稼疏曰此社亦是秋祭社之日也據此則祭社自以春秋甲日方丘自以夏日至不得合而為一也豐垣又因方丘一名方澤遂牽一澤字併合澤宫方澤為一今考禮天子將祭必先習射于澤疏曰澤所在無文蓋於寬閒之處近水澤為之又考周官澤虞注曰澤水所鍾也則方澤之宫皆近川澤庫門之內焉得為水所鍾乎豐垣又謂卿大夫入官而受祿者待臣之常數有功而受地者優臣之特典則是無采地者其常旱使屠擊祝頴豎柎有事于桑山斬其木不雨奪之官邑夫屠祝豎微職耳而亦得有官邑則謂有功始受地何所據乎豐垣蓋誤讀周禮司勳之文以賞田加田為采地故有是說也豐垣又謂大夫三廟王制有太祖而無曽祖祭法有曽祖而無太祖大夫干祫及其髙祖則未必有髙祖廟矣今考祭法干祫及其髙祖疏曰此言支庶為大夫士者耳若適為大夫亦得及太祖故王制大夫有太祖師說云大夫有始祖者思其百世若有善于君得祫則亦祫于太祖廟中遍祫太祖以下據此則干祫止及髙祖自據無始祖廟者耳豐垣即以證大夫無始祖廟是見其一不見其二也大傳曰别子為祖注曰别子謂公子若始采在此國者後世以為祖也以為祖而無廟豈尊祖之謂乎白虎通曰宗其為始祖後者為大宗此百世不遷者也宗其為髙祖後者為小宗五世而遷者也髙祖而有采地者其變今考禮運曰天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是為制度云制度者舉其常也則大夫有采非優異之特典明矣晉語曰公食貢大夫食邑士食田庶人食力言常制也荀子正論篇有天下者事七世有一國者事五世有五乘之地者事三世有三乘之地者事二世云五乘之地三乘之地皆言乎大夫士之常祿也晉語韓宣子以秦后子及楚公子賦祿問於叔向對曰大國之卿一旅之田上大夫一卒之田夫公子者上大夫也皆一卒可也宣子以秦公子富為難叔向對以無績于民乃與子干均其祿夫受此一卒之地𫝊明言無績于民則豐垣必云有功而始受地者不亦誤乎春秋襄公二十二年𫝊曰國之蠧也今倍其賦蓋倍魯大夫御叔之賦也杜注古者家有國邑故以重賦為罰御叔于魯非有功之大夫而有國邑昭十六年𫝊鄭大遷于上宗則易于下據此則大宗不易于下由始祖不遷于上也大夫而為大宗若無始祖廟又何緣為百世之宗核其所言殊乖禮意况周禮祭儀有曰凡祭王之所不與則賜之禽邦家亦如之注謂王所不與同姓有先王之廟則同姓之卿大夫尚得逺立祖王之廟而先自絶其始封之祖可乎是亦未之詳檢也他如謂禹貢五服職方九服二而實一謂周禮公五百侯四百里猶云今魯為方百里五非為方百里者二十五謂祭法有虞氏祖顓頊而宗堯不及魯語郊堯而宗舜亦皆前儒之緒論至駁萬斯大禘拾一事魯禘不追所自出及東周祖文宗武不祖稷之說又駁毛奇齡祧主别立廟不藏太祖廟之說議論最正援据亦詳為有禆禮制在近人之中尚為究心經義者雖論多出入固亦有可莭取焉乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
